name: MAUI Android Release

# Builds signed Android packages for FCA Contractor Command.
# Firebase App Distribution emails every tester on EACH upload — so distribution
# is opt-in for workflow_dispatch and automatic only on real main pushes.

on:
  workflow_dispatch:
    inputs:
      distribute_firebase:
        description: "Upload APK to Firebase App Distribution (emails testers)"
        type: boolean
        required: true
        default: false
      upload_play:
        description: "Upload AAB to Play internal track when Play API is ready"
        type: boolean
        required: true
        default: true
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/android-release.yml"
      - "FcaMobile.sln"

concurrency:
  group: maui-android-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  play-status:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.play.outputs.ready }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Probe Play Console API access
        id: play
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          PACKAGE_NAME: com.futurecontractorsofamerica.mobile
        run: |
          pip install -q google-auth requests
          python scripts/ci_probe_play_ready.py
          if [ "$(grep '^ready=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2)" != "true" ]; then
            echo "::notice::Play Console not linked yet — APK + optional Firebase only until org verification completes."
          fi

  release:
    needs: play-status
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.422

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Configure Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        shell: pwsh
        run: |
          if (-not $env:ANDROID_KEYSTORE_BASE64) {
            Write-Host "::notice::ANDROID_KEYSTORE_BASE64 not set — publish will use debug signing."
            exit 0
          }
          $bytes = [Convert]::FromBase64String($env:ANDROID_KEYSTORE_BASE64)
          $keystorePath = Join-Path $env:GITHUB_WORKSPACE "fca-mobile-release.keystore"
          [IO.File]::WriteAllBytes($keystorePath, $bytes)
          "KEYSTORE_PATH=$keystorePath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Restore
        run: dotnet restore FcaMobile.sln

      - name: Publish signed Android APK
        shell: pwsh
        run: |
          $publishArgs = @(
            "publish", "src/FcaMobile/FcaMobile.csproj",
            "-c", "Release",
            "-f", "net8.0-android",
            "-p:AndroidPackageFormat=apk"
          )
          if ($env:KEYSTORE_PATH) {
            $publishArgs += @(
              "-p:AndroidKeyStore=true",
              "-p:AndroidSigningKeyStore=$env:KEYSTORE_PATH",
              "-p:AndroidSigningStorePass=$env:ANDROID_KEYSTORE_PASSWORD",
              "-p:AndroidSigningKeyAlias=$env:ANDROID_KEY_ALIAS",
              "-p:AndroidSigningKeyPass=$env:ANDROID_KEY_PASSWORD"
            )
          }
          dotnet @publishArgs
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Publish signed Android AAB
        if: needs.play-status.outputs.ready == 'true' && (github.event_name == 'push' || inputs.upload_play == true)
        shell: pwsh
        run: |
          $publishArgs = @(
            "publish", "src/FcaMobile/FcaMobile.csproj",
            "-c", "Release",
            "-f", "net8.0-android",
            "-p:AndroidPackageFormat=aab"
          )
          if ($env:KEYSTORE_PATH) {
            $publishArgs += @(
              "-p:AndroidKeyStore=true",
              "-p:AndroidSigningKeyStore=$env:KEYSTORE_PATH",
              "-p:AndroidSigningStorePass=$env:ANDROID_KEYSTORE_PASSWORD",
              "-p:AndroidSigningKeyAlias=$env:ANDROID_KEY_ALIAS",
              "-p:AndroidSigningKeyPass=$env:ANDROID_KEY_PASSWORD"
            )
          }
          dotnet @publishArgs
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Locate release artifacts
        id: artifacts
        shell: pwsh
        run: |
          $root = Join-Path $env:GITHUB_WORKSPACE "release-artifacts"
          New-Item -ItemType Directory -Force -Path $root | Out-Null
          $apk = Get-ChildItem -Path "src/FcaMobile/bin/Release/net8.0-android" -Recurse -Filter "*.apk" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          $aab = Get-ChildItem -Path "src/FcaMobile/bin/Release/net8.0-android" -Recurse -Filter "*.aab" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $apk) { throw "No APK artifact found after publish." }
          $apkOut = Join-Path $root "fca-mobile-release.apk"
          Copy-Item $apk.FullName $apkOut -Force
          $hash = (Get-FileHash -Algorithm SHA256 $apkOut).Hash.ToLowerInvariant()
          Write-Host "APK: $apkOut"
          Write-Host "APK_SHA256=$hash"
          "apk_sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          if ($aab) {
            $aabOut = Join-Path $root "fca-mobile-release.aab"
            Copy-Item $aab.FullName $aabOut -Force
            Write-Host "AAB: $aabOut"
          } else {
            Write-Host "::notice::AAB skipped — Play Console not linked yet or upload_play=false."
          }

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fca-mobile-release-apk
          path: release-artifacts/fca-mobile-release.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        if: needs.play-status.outputs.ready == 'true' && (github.event_name == 'push' || inputs.upload_play == true)
        uses: actions/upload-artifact@v4
        with:
          name: fca-mobile-release-aab
          path: release-artifacts/fca-mobile-release.aab
          if-no-files-found: error

  distribute:
    needs: release
    # Push to main always distributes once per code change.
    # Manual dispatch must opt in — prevents agent/loop spam emailing testers.
    if: >
      always() && needs.release.result == 'success' &&
      (github.event_name == 'push' || inputs.distribute_firebase == true)
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: fca-mobile-release-apk
          path: release-artifacts

      - name: Detect Firebase configuration
        id: firebase
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_APP_ID" ] && [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::FIREBASE_APP_ID or FIREBASE_SERVICE_ACCOUNT_JSON not set — skipping distribution."
          fi

      - name: Skip duplicate APK (same SHA already distributed)
        id: dedupe
        if: steps.firebase.outputs.configured == 'true'
        env:
          LAST_SHA: ${{ vars.FCA_MOBILE_LAST_DISTRIBUTED_APK_SHA }}
        run: |
          set -euo pipefail
          HASH=$(sha256sum release-artifacts/fca-mobile-release.apk | awk '{print $1}')
          echo "apk_sha256=$HASH" >> "$GITHUB_OUTPUT"
          if [ -n "${LAST_SHA:-}" ] && [ "$HASH" = "$LAST_SHA" ]; then
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
            echo "::notice::APK SHA $HASH already distributed — skipping Firebase upload (no tester emails)."
          else
            echo "duplicate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Firebase App Distribution
        if: steps.firebase.outputs.configured == 'true' && steps.dedupe.outputs.duplicate != 'true'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: internal
          file: release-artifacts/fca-mobile-release.apk
          releaseNotes: "FCA Contractor Command ${{ github.sha }} (run ${{ github.run_id }})"
        continue-on-error: true

      - name: Record distributed APK SHA
        if: steps.firebase.outputs.configured == 'true' && steps.dedupe.outputs.duplicate != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HASH: ${{ steps.dedupe.outputs.apk_sha256 }}
        run: |
          set -euo pipefail
          # Best-effort: remember last distributed APK so redispatches do not re-email.
          gh variable set FCA_MOBILE_LAST_DISTRIBUTED_APK_SHA --body "$HASH" --repo "$GITHUB_REPOSITORY" || true

  play-upload:
    needs: [play-status, release]
    if: >
      always() && needs.release.result == 'success' &&
      needs.play-status.outputs.ready == 'true' &&
      (github.event_name == 'push' || inputs.upload_play == true)
    runs-on: ubuntu-latest
    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: fca-mobile-release-aab
          path: release-artifacts

      - name: Play Store internal track
        uses: r0adkll/upload-google-play@v1
        continue-on-error: true
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.futurecontractorsofamerica.mobile
          releaseFiles: release-artifacts/fca-mobile-release.aab
          track: internal
          status: completed
