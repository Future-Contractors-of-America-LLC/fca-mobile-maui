name: MAUI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.422

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore FcaMobile.sln

      - name: Build Android
        run: dotnet build src/FcaMobile/FcaMobile.csproj -c Release -f net8.0-android --no-restore

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.422

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore FcaMobile.sln

      - name: Build iOS
        run: dotnet build src/FcaMobile/FcaMobile.csproj -c Release -f net8.0-ios --no-restore
